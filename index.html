<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DIVINA SALADA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:#f3f4f6;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btnLogin{
width:100%;
background:#22c55e;
color:white;
margin-top:15px;
}

.topo{
background:#16a34a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.pesquisa{
padding:12px;
width:100%;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ccc;
}

.dashboard{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.boxDash{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.btnAtender{
background:#22c55e;
color:white;
}

.btnReimprimir{
background:#2563eb;
color:white;
}

.btnEditar{
background:#f59e0b;
color:white;
}

.btnExcluir{
background:#dc2626;
color:white;
}

.tabelaPedidos{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
margin-bottom:30px;
}

.tabelaPedidos th{
background:#16a34a;
color:white;
padding:12px;
font-size:14px;
}

.tabelaPedidos td{
padding:12px;
border-bottom:1px solid #ddd;
font-size:14px;
}

.tabelaPedidos tr:hover{
background:#f3f4f6;
cursor:pointer;
}

button:hover{
opacity:.85;
transform:scale(1.02);
transition:.2s;
}

input:focus{
outline:none;
border:2px solid #22c55e;
}

</style>

</head>

<body>

<div id="loginTela" class="login">

<div class="box">

<h2>DIVINA SALADA</h2>

<input
type="email"
id="usuario"
placeholder="E-mail">

<input
type="password"
id="senha"
placeholder="Senha">

<button
class="btnLogin"
onclick="fazerLogin()">

ENTRAR

</button>

</div>

</div>

<div id="painel" style="display:none;">

<div class="topo">

<h2>DIVINA SALADA</h2>

<button onclick="logout()">

SAIR

</button>

</div>

<div class="container">

<div style="
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
">

<button onclick="mostrarAba('dashboard')">
DASHBOARD
</button>

<button onclick="mostrarAba('pendentes')">
PEDIDOS A ATENDER
</button>

<button onclick="mostrarAba('atendidos')">
PEDIDOS ATENDIDOS
</button>

</div>

<div id="abaDashboard">

<div class="dashboard">

<div class="boxDash">
Hoje<br>
<span id="totalHoje">0</span>
</div>

<div class="boxDash">
Pendentes<br>
<span id="totalPendentes">0</span>
</div>

<div class="boxDash">
Atendidos<br>
<span id="totalAtendidos">0</span>
</div>

</div>

<div style="
background:white;
padding:20px;
border-radius:12px;
">

<h2>STATUS DA COZINHA</h2>

<div
id="statusCozinha"
style="
font-size:22px;
font-weight:bold;
">

🟢 Cozinha Livre

</div>

<br>

<h2>ÚLTIMO PEDIDO</h2>

<div id="ultimoPedido">

Nenhum

</div>

</div>

</div>

<div id="abaPendentes" style="display:none;">

<h1>Pedidos Pendentes</h1>

<input
id="pesquisaPendentes"
class="pesquisa"
placeholder="Pesquisar"
onkeyup="filtrarPedidos('pendentes')"
>

<table class="tabelaPedidos">

<thead>

<tr>

<th>ID</th>
<th>CLIENTE</th>
<th>LOCAL</th>
<th>STATUS</th>
<th>AÇÕES</th>

</tr>

</thead>

<tbody id="pedidosPendentes"></tbody>

</table>

</div>

<div id="abaAtendidos" style="display:none;">

<h1>Pedidos Atendidos</h1>

<input
id="pesquisaAtendidos"
class="pesquisa"
placeholder="Pesquisar"
onkeyup="filtrarPedidos('atendidos')"
>

<table class="tabelaPedidos">

<thead>

<tr>

<th>ID</th>
<th>CLIENTE</th>
<th>LOCAL</th>
<th>STATUS</th>
<th>AÇÕES</th>

</tr>

</thead>

<tbody id="pedidosAtendidos"></tbody>

</table>

</div>

</div>

</div>

<script>

const supabaseUrl =
"https://iwvyptljwwdqmpixgpyc.supabase.co";

const supabaseKey =
"sb_publishable_UwCk5xuRDMSfXnzZjbMNvw_u_QaXulQ";

const client =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

async function verificarLogin(){

const { data } =
await client.auth.getSession();

if(data.session){

document.getElementById("loginTela")
.style.display = "none";

document.getElementById("painel")
.style.display = "block";

mostrarAba("dashboard");

carregarDashboard();

}

}

verificarLogin();

async function fazerLogin(){

const email =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

const { data, error } =
await client.auth.signInWithPassword({

email: email,
password: senha

});

console.log("DATA:", data);
console.log("ERROR:", error);

if(error){

alert(
"ERRO REAL:\n\n" +
error.message
);

return;

}

alert("Login realizado!");

document.getElementById("loginTela")
.style.display = "none";

document.getElementById("painel")
.style.display = "block";

mostrarAba("dashboard");

carregarDashboard();

}

async function logout(){

await client.auth.signOut();

location.reload();

}

function mostrarAba(aba){

document.getElementById("abaDashboard")
.style.display = "none";

document.getElementById("abaPendentes")
.style.display = "none";

document.getElementById("abaAtendidos")
.style.display = "none";

if(aba === "dashboard"){

document.getElementById("abaDashboard")
.style.display = "block";

}

if(aba === "pendentes"){

document.getElementById("abaPendentes")
.style.display = "block";

}

if(aba === "atendidos"){

document.getElementById("abaAtendidos")
.style.display = "block";

}

}

function filtrarPedidos(tipo){

const valor = document.getElementById(

tipo === "pendentes"
? "pesquisaPendentes"
: "pesquisaAtendidos"

).value.toLowerCase();

const lista = tipo === "pendentes"

? document.querySelectorAll("#pedidosPendentes .pedidoItem")

: document.querySelectorAll("#pedidosAtendidos .pedidoItem");

lista.forEach(item => {

const texto =
item.innerText.toLowerCase();

item.style.display =
texto.includes(valor)
? "table-row"
: "none";

});

}

async function carregarDashboard(){

const { data } = await client
.from("pedidos")
.select("*")
.order("id",{ ascending:false });

if(!data) return;

const pendentes =
data.filter(p => p.status !== "ATENDIDO");

const atendidos =
data.filter(p => p.status === "ATENDIDO");

document.getElementById("totalHoje")
.innerText = data.length;

document.getElementById("totalPendentes")
.innerText = pendentes.length;

document.getElementById("totalAtendidos")
.innerText = atendidos.length;

if(pendentes.length >= 10){

document.getElementById("statusCozinha")
.innerHTML = "🔴 Cozinha Lotada";

}else if(pendentes.length >= 5){

document.getElementById("statusCozinha")
.innerHTML = "🟡 Movimento Alto";

}else{

document.getElementById("statusCozinha")
.innerHTML = "🟢 Cozinha Livre";

}

if(data.length > 0){

const ultimo = data[0];

document.getElementById("ultimoPedido")
.innerHTML = `

<b>${ultimo.nome}</b><br>
${ultimo.local_entrega}

`;

}

renderizarPedidos(
pendentes,
"pedidosPendentes",
false
);

renderizarPedidos(
atendidos,
"pedidosAtendidos",
true
);

}

function renderizarPedidos(
lista,
divId,
atendido
){

const div =
document.getElementById(divId);

if(lista.length === 0){

div.innerHTML = `

<tr>
<td colspan="5">
Nenhum pedido.
</td>
</tr>

`;

return;

}

let html = "";

lista.forEach(pedido => {

html += `

<tr class="pedidoItem">

<td>${pedido.id}</td>

<td>${pedido.nome}</td>

<td>${pedido.local_entrega}</td>

<td>
${atendido ? "ATENDIDO" : "PENDENTE"}
</td>

<td style="
display:flex;
gap:5px;
flex-wrap:wrap;
">

${!atendido ? `

<button
class="btnAtender"
onclick="atenderPedido(${pedido.id})">

ATENDER

</button>

` : ""}

<button
class="btnEditar"
onclick="editarPedido(${pedido.id})">

EDITAR

</button>

<button
class="btnReimprimir"
onclick="imprimirPedido(${pedido.id})">

${atendido ? "REIMPRIMIR" : "IMPRIMIR"}

</button>

<button
class="btnExcluir"
onclick="excluirPedido(${pedido.id})">

EXCLUIR

</button>

</td>

</tr>

`;

});

div.innerHTML = html;

}

async function atenderPedido(id){

await client
.from("pedidos")
.update({

status:"ATENDIDO"

})
.eq("id",id);

carregarDashboard();

}

async function excluirPedido(id){

const confirma =
confirm("Deseja excluir?");

if(!confirma) return;

await client
.from("pedidos")
.delete()
.eq("id",id);

alert("Pedido excluído!");

carregarDashboard();

}
async function editarPedido(id){

const { data } = await client
.from("pedidos")
.select("*")
.eq("id",id)
.single();

if(!data){
alert("Pedido não encontrado");
return;
}

const novoNome =
prompt("Nome do cliente:", data.nome);

if(novoNome === null) return;

const novoLocal =
prompt(
"Local de entrega:",
data.local_entrega
);

if(novoLocal === null) return;

await client
.from("pedidos")
.update({
nome: novoNome,
local_entrega: novoLocal
})
.eq("id",id);

alert("Pedido atualizado!");

carregarDashboard();

}

async function imprimirPedido(id){

const { data } = await client
.from("pedidos")
.select("*")
.eq("id",id)
.single();

if(!data){
alert("Pedido não encontrado");
return;
}

const janela =
window.open("","_blank");

janela.document.write(`

<html>

<head>

<title>Pedido ${data.id}</title>

<style>

@page{
size:80mm auto;
margin:3mm;
}

body{
font-family:Arial;
font-size:12px;
width:72mm;
margin:auto;
}

h2{
text-align:center;
}

hr{
border:none;
border-top:1px dashed #000;
}

</style>

</head>

<body>

<h2>DIVINA SALADA</h2>

<hr>

<b>PEDIDO:</b> ${data.id}<br>
<b>CLIENTE:</b> ${data.nome}<br>
<b>LOCAL:</b> ${data.local_entrega}<br>

<hr>

<b>EMBALAGEM:</b><br>
${data.tamanho || ""}<br><br>

<b>PROTEÍNA:</b><br>
${data.proteina || ""}<br><br>

<b>GUARNIÇÕES:</b><br>
${data.guarnicoes || ""}<br><br>

<b>MOLHO:</b><br>
${data.molho || ""}<br><br>

<b>MIX DE FOLHAS:</b><br>
${data.mix_folhas || ""}<br><br>

<b>TALHER:</b><br>
${data.talher || ""}<br><br>

<b>SOBREMESA:</b><br>
${data.sobremesa || ""}<br><br>

<b>BEBIDA:</b><br>
${data.bebida || ""}<br><br>

<hr>

<b>PAGAMENTO:</b><br>
${data.pagamento || ""}

<hr>

<b>STATUS:</b>
${data.status}

</body>

</html>

`);

janela.document.close();

setTimeout(()=>{
janela.print();
},500);

}

setInterval(
carregarDashboard,
5000
);

</script>

</body>
</html>
