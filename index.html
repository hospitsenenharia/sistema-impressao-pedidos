<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SISTEMA DE IMPRESSÃO DE PEDIDOS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0f172a;
color:white;
}

#loginTela{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:350px;
background:#1e293b;
padding:30px;
border-radius:15px;
}

.login-box h1{
text-align:center;
margin-bottom:20px;
font-size:22px;
}

.login-box input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:8px;
}

.login-box button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#4338ca;
color:white;
cursor:pointer;
font-size:16px;
}

#painel{
display:none;
}

.menu{
width:260px;
height:100vh;
background:#1e293b;
position:fixed;
left:0;
top:0;
padding-top:20px;
overflow:auto;
}

.logo{
text-align:center;
font-size:24px;
font-weight:bold;
margin-bottom:40px;
}

.menu button{
width:100%;
padding:18px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
font-size:17px;
}

.menu button:hover{
background:#334155;
}

.conteudo{
margin-left:260px;
padding:20px;
}

.tela{
display:none;
}

.tela.ativa{
display:block;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card-dashboard{
background:#1e293b;
padding:25px;
border-radius:15px;
border-left:8px solid #22c55e;
}

.card-dashboard span{
font-size:32px;
font-weight:bold;
color:#22c55e;
}

#graficoPedidos{
background:white;
border-radius:15px;
margin-top:20px;
padding:20px;
max-height:400px;
}

#pesquisa,
#pesquisaAtendidos{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-top:20px;
font-size:16px;
}

#pedidosPendentes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
border-left:8px solid #22c55e;
}

.card.atendido{
border-left:8px solid red;
background:#3b1111;
}

.info{
margin:8px 0;
font-size:16px;
}

.totalPedido{
margin-top:15px;
font-size:22px;
color:#22c55e;
font-weight:bold;
}

.btn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:8px;
background:#4338ca;
color:white;
cursor:pointer;
font-size:16px;
}

.dataPedido{
margin-top:10px;
color:#94a3b8;
font-size:14px;
}

#pedidosAtendidosLista{
margin-top:20px;
background:#1e293b;
border-radius:15px;
overflow:hidden;
}

.itemAtendido{
padding:15px;
border-bottom:1px solid #334155;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.itemAtendido:hover{
background:#334155;
}

#pedidoDetalhes{
margin-top:20px;
}

</style>

</head>

<body>

<div id="loginTela">

<div class="login-box">

<h1>🖨️ SISTEMA DE IMPRESSÃO DE PEDIDOS</h1>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">
ENTRAR
</button>

</div>

</div>

<div id="painel">

<div class="menu">

<div class="logo">
🖨️ PEDIDOS
</div>

<button onclick="abrirTela('dashboard')">
📊 Dashboard
</button>

<button onclick="abrirTela('pendentes')">
📦 Pedidos a Atender
</button>

<button onclick="abrirTela('atendidos')">
✅ Pedidos Atendidos
</button>

</div>

<div class="conteudo">

<div id="dashboard" class="tela ativa">

<h1>Dashboard</h1>

<br>

<div class="dashboard">

<div class="card-dashboard">
<h2>Vendas Hoje</h2>
<span id="totalHoje">R$ 0,00</span>
</div>

<div class="card-dashboard">
<h2>Vendas Semana</h2>
<span id="totalSemana">R$ 0,00</span>
</div>

<div class="card-dashboard">
<h2>Vendas Mês</h2>
<span id="totalMes">R$ 0,00</span>
</div>

</div>

<canvas id="graficoPedidos"></canvas>

</div>

<div id="pendentes" class="tela">

<h1>Pedidos a Atender</h1>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar ID, nome, data ou pagamento"
onkeyup="filtrarPedidos()">

<div id="pedidosPendentes"></div>

</div>

<div id="atendidos" class="tela">

<h1>Pedidos Atendidos</h1>

<input
type="text"
id="pesquisaAtendidos"
placeholder="Pesquisar ID, nome, data ou pagamento"
onkeyup="filtrarAtendidos()">

<div id="pedidosAtendidosLista"></div>

<div id="pedidoDetalhes"></div>

</div>

</div>

</div>

<script>

function login(){

const usuario =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

if(usuario === "admin" && senha === "123456"){

document.getElementById("loginTela").style.display = "none";
document.getElementById("painel").style.display = "block";

carregarPedidos();
carregarDashboard();

}
else{

alert("Usuário ou senha inválidos");

}

}

function abrirTela(id){

document.querySelectorAll(".tela")
.forEach(t => {
t.classList.remove("ativa");
});

document.getElementById(id)
.classList.add("ativa");

}

const SUPABASE_URL =
"https://iwvyptljwwdqmpixgpyc.supabase.co";

const SUPABASE_KEY =
"sb_publishable_UwCk5xuRDMSfXnzZjbMNvw_u_QaXulQ";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

function calcularValor(pedido){

let total = 0;

if(pedido.tamanho?.includes("270")){
total += 19.75;
}

if(pedido.tamanho?.includes("350")){
total += 24.90;
}

if(pedido.mix_talher?.includes("SIM")){
total += 0.75;
}

if(
pedido.sobremesa &&
!pedido.sobremesa.includes("SEM")
){
total += 6.50;
}

if(
pedido.bebida &&
!pedido.bebida.includes("SEM")
){
total += 6.50;
}

return total;

}

async function carregarDashboard(){

const { data } =
await supabaseClient
.from("pedidos")
.select("*");

let hoje = 0;
let semana = 0;
let mes = 0;

const agora = new Date();

data.forEach(pedido => {

if(pedido.status !== "ATENDIDO"){
return;
}

const valor = calcularValor(pedido);

const dataPedido =
new Date(pedido.data_hora);

const diff =
(agora - dataPedido)
/ (1000 * 60 * 60 * 24);

if(dataPedido.toDateString() === agora.toDateString()){
hoje += valor;
}

if(diff <= 7){
semana += valor;
}

if(dataPedido.getMonth() === agora.getMonth()){
mes += valor;
}

});

document.getElementById("totalHoje").innerText =
"R$ " + hoje.toFixed(2);

document.getElementById("totalSemana").innerText =
"R$ " + semana.toFixed(2);

document.getElementById("totalMes").innerText =
"R$ " + mes.toFixed(2);

if(window.graficoVendas){
window.graficoVendas.destroy();
}

const ctx =
document.getElementById("graficoPedidos");

window.graficoVendas =
new Chart(ctx, {

type:"bar",

data:{

labels:["Hoje","Semana","Mês"],

datasets:[{

label:"Total de Vendas",

data:[hoje,semana,mes],

borderWidth:1

}]

},

options:{
responsive:true
}

});

}

async function carregarPedidos(){

const { data } =
await supabaseClient
.from("pedidos")
.select("*")
.order("id", {
ascending:false
});

const pendentes =
document.getElementById("pedidosPendentes");

const atendidosLista =
document.getElementById("pedidosAtendidosLista");

pendentes.innerHTML = "";
atendidosLista.innerHTML = "";

data.forEach(pedido => {

const valor =
calcularValor(pedido);

if(pedido.status !== "ATENDIDO"){

const card = `

<div class="card">

<h2>
#${pedido.id} - ${pedido.nome || ""}
</h2>

<div class="dataPedido">
📅 ${pedido.data_hora || ""}
</div>

<div class="info">
📍 ${pedido.local_entrega || ""}
</div>

<div class="info">
🏠 ${pedido.endereco || ""}
</div>

<div class="info">
🍱 ${pedido.tamanho || ""}
</div>

<div class="info">
🍖 ${pedido.proteina || ""}
</div>

<div class="info">
🥗 ${pedido.guarnicoes || ""}
</div>

<div class="info">
🧂 ${pedido.molho || ""}
</div>

<div class="info">
🍴 ${pedido.mix_talher || ""}
</div>

<div class="info">
🍰 ${pedido.sobremesa || ""}
</div>

<div class="info">
🥤 ${pedido.bebida || ""}
</div>

<div class="info">
💳 ${pedido.forma_pagamento || ""}
</div>

<div class="totalPedido">
💰 R$ ${valor.toFixed(2)}
</div>

<button
class="btn"
onclick="imprimirPedido(${pedido.id})">

✅ ATENDER E IMPRIMIR

</button>

</div>

`;

pendentes.innerHTML += card;

}

else{

const item = `

<div
class="itemAtendido"
onclick='mostrarDetalhes(${JSON.stringify(pedido)})'>

<div>
<b>#${pedido.id}</b> - ${pedido.nome}
</div>

<div>
${pedido.data_hora || ""}
</div>

</div>

`;

atendidosLista.innerHTML += item;

}

});

}

function mostrarDetalhes(pedido){

const detalhes =
document.getElementById("pedidoDetalhes");

if(detalhes.dataset.id == pedido.id){

detalhes.innerHTML = "";
detalhes.dataset.id = "";
return;

}

detalhes.dataset.id = pedido.id;

const valor =
calcularValor(pedido);

detalhes.innerHTML = `

<div class="card atendido">

<h2>
#${pedido.id} - ${pedido.nome}
</h2>

<div class="dataPedido">
📅 ${pedido.data_hora || ""}
</div>

<div class="info">
📍 ${pedido.local_entrega || ""}
</div>

<div class="info">
🏠 ${pedido.endereco || ""}
</div>

<div class="info">
🍱 ${pedido.tamanho || ""}
</div>

<div class="info">
🍖 ${pedido.proteina || ""}
</div>

<div class="info">
🥗 ${pedido.guarnicoes || ""}
</div>

<div class="info">
🧂 ${pedido.molho || ""}
</div>

<div class="info">
🍴 ${pedido.mix_talher || ""}
</div>

<div class="info">
🍰 ${pedido.sobremesa || ""}
</div>

<div class="info">
🥤 ${pedido.bebida || ""}
</div>

<div class="info">
💳 ${pedido.forma_pagamento || ""}
</div>

<div class="totalPedido">
💰 R$ ${valor.toFixed(2)}
</div>

<button
class="btn"
onclick="fecharDetalhes()">

❌ FECHAR

</button>

</div>

`;

}

function fecharDetalhes(){

document.getElementById("pedidoDetalhes").innerHTML = "";
document.getElementById("pedidoDetalhes").dataset.id = "";

}

function filtrarPedidos(){

const termo =
document.getElementById("pesquisa")
.value.toLowerCase();

document
.querySelectorAll("#pedidosPendentes .card")
.forEach(card => {

const texto =
card.innerText.toLowerCase();

card.style.display =
texto.includes(termo)
? "block"
: "none";

});

}

function filtrarAtendidos(){

const termo =
document
.getElementById("pesquisaAtendidos")
.value.toLowerCase();

document
.querySelectorAll(".itemAtendido")
.forEach(card => {

const texto =
card.innerText.toLowerCase();

card.style.display =
texto.includes(termo)
? "flex"
: "none";

});

}

async function imprimirPedido(id){

const { data } =
await supabaseClient
.from("pedidos")
.select("*")
.eq("id", id)
.single();

const total =
calcularValor(data);

const html = `

<html>

<body style="font-family:monospace;width:80mm">

<h2 style="text-align:center">
SISTEMA DE IMPRESSÃO DE PEDIDOS
</h2>

<hr>

Pedido Nº ${data.id}<br><br>

Cliente: ${data.nome}<br><br>

Data: ${data.data_hora}<br><br>

Entrega: ${data.local_entrega}<br><br>

Endereço: ${data.endereco || ""}<br><br>

Tamanho: ${data.tamanho || ""}<br><br>

Proteína: ${data.proteina || ""}<br><br>

Guarnições: ${data.guarnicoes || ""}<br><br>

Molho: ${data.molho || ""}<br><br>

Talher: ${data.mix_talher || ""}<br><br>

Sobremesa: ${data.sobremesa || ""}<br><br>

Bebida: ${data.bebida || ""}<br><br>

Pagamento: ${data.forma_pagamento || ""}<br><br>

<hr>

<h1 style="text-align:center">

TOTAL<br>

R$ ${total.toFixed(2)}

</h1>

<script>

window.onload = function(){

window.print();
window.close();

}

<\/script>

</body>

</html>

`;

const janela =
window.open("", "", "width=400,height=600");

janela.document.write(html);

janela.document.close();

await supabaseClient
.from("pedidos")
.update({
status:"ATENDIDO"
})
.eq("id", id);

carregarPedidos();
carregarDashboard();

}

function tocarSom(){

const audio = new Audio(
"https://www.soundjay.com/buttons/sounds/button-3.mp3"
);

audio.play();

}

supabaseClient
.channel("pedidos")

.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"pedidos"
},

payload => {

carregarPedidos();
carregarDashboard();

tocarSom();

alert("NOVO PEDIDO RECEBIDO!");

}
)

.on(
"postgres_changes",
{
event:"UPDATE",
schema:"public",
table:"pedidos"
},

payload => {

carregarPedidos();
carregarDashboard();

}
)

.subscribe();

</script>

</body>
</html>
