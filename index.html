<script>

const supabaseUrl = "https://iwvyptljwwdqmpixgpyc.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3dnlwdGxqd3dkcW1waXhncHljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTg1NTIsImV4cCI6MjA5NDI5NDU1Mn0.aTn3vvUc4kIcOidmVzVFcEY4F_E5EnRxcONd8cDtQyI";

const client = window.supabase.createClient(
supabaseUrl,
supabaseKey
);

function fazerLogin(){

const usuario =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

if(
usuario === "admin"
&&
senha === "12345678"
){

document.getElementById("loginTela")
.style.display = "none";

document.getElementById("painel")
.style.display = "block";

mostrarAba("dashboard");

carregarDashboard();

}else{

alert("Login inválido");

}

}



function logout(){

location.reload();

}


function abrirSistema(){

document.getElementById("loginTela").style.display = "none";
document.getElementById("painel").style.display = "block";

carregarDashboard();

}



function mostrarAba(aba){

document.getElementById("abaDashboard").style.display = "none";
document.getElementById("abaPendentes").style.display = "none";
document.getElementById("abaAtendidos").style.display = "none";

if(aba === "dashboard"){
document.getElementById("abaDashboard").style.display = "block";
}

if(aba === "pendentes"){
document.getElementById("abaPendentes").style.display = "block";
}

if(aba === "atendidos"){
document.getElementById("abaAtendidos").style.display = "block";
}

}

function filtrarPedidos(tipo){

const valor = document.getElementById(
tipo === "pendentes"
? "pesquisaPendentes"
: "pesquisaAtendidos"
).value.toLowerCase();

const lista = tipo === "pendentes"
? document.querySelectorAll("#pedidosPendentes .pedidoItem")
: document.querySelectorAll("#pedidosAtendidos .pedidoItem");

lista.forEach(item => {

const texto = item.innerText.toLowerCase();

item.style.display = texto.includes(valor)
? "table-row"
: "none";

});

}

async function carregarDashboard(){

const { data } = await client
.from("pedidos")
.select("*")
.order("id", { ascending:false });

const pendentes =
data.filter(p => p.status !== "ATENDIDO");

const atendidos =
data.filter(p => p.status === "ATENDIDO");

const hoje = new Date();

const hojeTxt = hoje.toISOString().split("T")[0];

let totalHoje = 0;
let totalMes = 0;

const mesAtual = hoje.getMonth()+1;
const anoAtual = hoje.getFullYear();

(data || []).forEach(p => {

if(p.created_at){

const dataPedido = new Date(p.created_at);

const diaPedido = dataPedido.toISOString().split("T")[0];

if(diaPedido === hojeTxt){
totalHoje++;
}

if(
(dataPedido.getMonth()+1) === mesAtual &&
dataPedido.getFullYear() === anoAtual
){

totalMes++;

}

}

});


document.getElementById("totalHoje").innerText = totalHoje;

const inicioSemana = new Date();

inicioSemana.setDate(
hoje.getDate() - hoje.getDay()
);

let totalSemana = 0;

(data || []).forEach(p => {

if(p.created_at){

const dataPedido =
new Date(p.created_at);

if(dataPedido >= inicioSemana){
totalSemana++;
}

}

});

document.getElementById("totalSemana")
.innerText = totalSemana;

document.getElementById("totalSemana").innerText = data.length;
document.getElementById("totalMes").innerText = totalMes;
document.getElementById("totalPendentes").innerText = pendentes.length;
document.getElementById("totalAtendidos").innerText = atendidos.length;
document.getElementById("producaoDia")
.innerText =
totalHoje + " pedidos";

if(pendentes.length >= 10){

document.getElementById("statusCozinha")
.innerHTML =
"🔴 Cozinha Lotada";

}else if(pendentes.length >= 5){

document.getElementById("statusCozinha")
.innerHTML =
"🟡 Movimento Alto";

}else{

document.getElementById("statusCozinha")
.innerHTML =
"🟢 Cozinha Livre";

}

if(data.length > 0){

const ultimo = data[0];

document.getElementById("ultimoPedido")
.innerHTML = `

<b>${ultimo.nome}</b><br>
${ultimo.proteina}<br>
${ultimo.local_entrega}

`;

}

renderizarPedidos(pendentes,"pedidosPendentes",false);
renderizarPedidos(atendidos,"pedidosAtendidos",true);

}

function renderizarPedidos(lista, divId, atendido){

const div = document.getElementById(divId);

if(lista.length === 0){

div.innerHTML = `
<tr>
<td colspan="6">
Nenhum pedido.
</td>
</tr>
`;

return;

}

let html = "";

lista.forEach(pedido => {

html += `

<tr
class="pedidoItem"
ondblclick="abrirPedido(${pedido.id})"
>

<td>${pedido.id}</td>

<td>${pedido.nome}</td>

<td>${pedido.data_hora}</td>

<td>${pedido.local_entrega}</td>

<td>
${atendido ? "ATENDIDO" : "PENDENTE"}
</td>

<td style="display:flex;gap:5px;flex-wrap:wrap;">

${!atendido ? `

<button
class="btnAtender"
onclick="atenderPedido(${pedido.id})"
>
ATENDER
</button>

` : ""}

<button
class="btnReimprimir"
onclick="reimprimirPedido(${pedido.id})"
>
REIMPRIMIR
</button>

<button
class="btnEditar"
onclick="editarPedido(${pedido.id})"
>
EDITAR
</button>

<button
class="btnExcluir"
onclick="excluirPedido(${pedido.id})"
>
EXCLUIR
</button>

</td>

</tr>

`;

});


div.innerHTML = html;

}

async function atenderPedido(id){

const { data } = await client
.from("pedidos")
.select("*")
.eq("id", id)
.single();

imprimirPedido(data);

await client
.from("pedidos")
.update({ status:"ATENDIDO" })
.eq("id", id);

carregarDashboard();

}

async function reimprimirPedido(id){

const { data } = await client
.from("pedidos")
.select("*")
.eq("id", id)
.single();

imprimirPedido(data);

}

const { data } =
await client
.from("pedidos")
.select("*")
.eq("id", id)
.single();

alert(
`
PEDIDO #${data.id}

CLIENTE:
${data.nome}

LOCAL:
${data.local_entrega}

ENDEREÇO:
${data.endereco}

EMBALAGEM:
${data.tamanho}

PROTEÍNA:
${data.proteina}

GUARNIÇÕES:
${data.guarnicoes}

MOLHO:
${data.molho}

MIX FOLHAS:
${data.mix_folhas}

TALHER:
${data.talher}

SOBREMESA:
${data.sobremesa}

BEBIDA:
${data.bebida}

PAGAMENTO:
${data.pagamento}
`
);

}

</div>

`;

div.id = "modalEditar";

function fecharModal(){

const modal =
document.getElementById("modalEditar");

if(modal){
modal.remove();
}

}

async function salvarEdicao(id){

await client
.from("pedidos")
.update({

nome:
document.getElementById("edit_nome").value,

local_entrega:
document.getElementById("edit_local").value,

tamanho:
document.getElementById("edit_tamanho").value,

proteina:
document.getElementById("edit_proteina").value,

guarnicoes:
document.getElementById("edit_guarnicoes").value,

molho:
document.getElementById("edit_molho").value,

mix_folhas:
document.getElementById("edit_mix").value,

talher:
document.getElementById("edit_talher").value,

sobremesa:
document.getElementById("edit_sobremesa").value,

bebida:
document.getElementById("edit_bebida").value,

pagamento:
document.getElementById("edit_pagamento").value,

endereco:
document.getElementById("edit_endereco").value

})
.eq("id", id);

alert("Pedido atualizado!");

fecharModal();

carregarDashboard();

}

async function excluirPedido(id){

const confirma =
confirm("Deseja excluir o pedido?");

if(!confirma) return;

await client
.from("pedidos")
.delete()
.eq("id", id);

alert("Pedido excluído!");

carregarDashboard();

}
