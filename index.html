<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#041330;
color:#fff;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:320px;
background:#1b2945;
padding:30px;
}

.logo{

margin-bottom:50px;
}

.menu button{
width:100%;

border:none;
border-radius:10px;

color:#fff;

cursor:pointer;

}

}

.conteudo{

padding:30px;
overflow:auto;
}

.tela{

}

.tela.ativa{
display:block;
}

.cards{

gap:20px;

}

.card{

padding:30px;
border-radius:20px;
flex:1;

}

.card h2{

}

.card span{

}

#graficoPedidos{
background:#fff;
padding:20px;
border-radius:20px;
max-height:400px;
}

.cardPedidoResumo{
background:#1b2945;
padding:20px;
border-radius:15px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
cursor:pointer;
font-size:22px;
}

.cardPedido{
display:none;
background:#5b0000;
padding:30px;
border-radius:20px;
margin-bottom:25px;
border-left:12px solid red;
font-size:24px;
}

.cardPedido.ativo{
display:block;
}

.cardPedido h2{
font-size:40px;
margin-bottom:20px;
}

.cardPedido p{
margin-bottom:15px;
line-height:1.5;
}

.btn{
padding:15px 25px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:#fff;
}

.btnPrint{
background:#16a34a;
}

.btnEditar{
background:#2563eb;
}

.btnExcluir{
background:#dc2626;
}

.pesquisa{
width:100%;
padding:18px;
border:none;
border-radius:10px;
font-size:20px;
margin-bottom:25px;
}

.login{
position:fixed;
inset:0;
background:#041330;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loginBox{
background:#1b2945;
padding:40px;
border-radius:20px;
width:350px;
}

.loginBox h1{
margin-bottom:25px;
text-align:center;
}

.loginBox input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:18px;
}

.loginBox button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login" id="loginTela">

<div class="loginBox">

<h1>LOGIN</h1>

<input type="text" id="usuario" placeholder="Usuário">

<input type="password" id="senha" placeholder="Senha">

<button onclick="fazerLogin()">
ENTRAR
</button>

</div>

</div>

<div id="painel" style="display:none;width:100%;height:100%;">

<div class="sidebar">

<div class="logo">
🖨️ PEDIDOS
</div>

<div class="menu">

<button onclick="abrirTela('dashboard')">
📊 Dashboard
</button>

<button onclick="abrirTela('pendentes')">
📦 Pedidos a Atender
</button>

<button onclick="abrirTela('atendidos')">
✅ Pedidos Atendidos
</button>

<button onclick="logout()">
🚪 Sair
</button>

</div>

</div>

<div class="conteudo">

<div id="dashboard" class="tela ativa">

<h1 style="font-size:60px;margin-bottom:30px;">
Dashboard
</h1>

<div class="cards">

<div class="card">
<h2>Vendas Hoje</h2>
<span id="totalHoje">R$ 0.00</span>
</div>

<div class="card">
<h2>Vendas Semana</h2>
<span id="totalSemana">R$ 0.00</span>
</div>

<div class="card">
<h2>Vendas Mês</h2>
<span id="totalMes">R$ 0.00</span>
</div>

</div>

<canvas id="graficoPedidos"></canvas>

</div>

<div id="pendentes" class="tela">

<h1 style="font-size:50px;margin-bottom:20px;">
Pedidos a Atender
</h1>

<div id="pedidosPendentes"></div>

</div>

<div id="atendidos" class="tela">

<h1 style="font-size:50px;margin-bottom:20px;">
Pedidos Atendidos
</h1>

<div id="pedidosAtendidos"></div>

</div>

</div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://iwvyptljwwdqmpixgpyc.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3dnlwdGxqd3dkcW1waXhncHljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTg1NTIsImV4cCI6MjA5NDI5NDU1Mn0.aTn3vvUc4kIcOidmVzVFcEY4F_E5EnRxcONd8cDtQyI"
);

function fazerLogin(){

const usuario =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

if(
usuario === "admin" &&
senha === "sesc123"
){

localStorage.setItem("logado","sim");

document.getElementById("loginTela").style.display = "none";

document.getElementById("painel").style.display = "flex";

carregarPedidos();
carregarDashboard();

}else{

alert("Usuário ou senha inválidos");

}

}

function logout(){

localStorage.removeItem("logado");

location.reload();

}

window.onload = () => {

const logado =
localStorage.getItem("logado");

if(logado === "sim"){

document.getElementById("loginTela").style.display = "none";

document.getElementById("painel").style.display = "flex";

carregarPedidos();
carregarDashboard();

}

};

function abrirTela(id){

document.querySelectorAll(".tela")
.forEach(t => t.classList.remove("ativa"));

document.getElementById(id)
.classList.add("ativa");

}

function togglePedido(id){

const pedido =
document.getElementById(`pedido_${id}`);

pedido.classList.toggle("ativo");

}

function calcularValor(pedido){

let total = 0;

if(pedido.tamanho?.includes("270")){
total += 19.75;
}

if(pedido.tamanho?.includes("350")){
total += 21.75;
}

if(
pedido.talher &&
pedido.talher.toUpperCase().includes("SIM")
){
total += 0.75;
}

if(
pedido.sobremesa &&
!pedido.sobremesa.toUpperCase().includes("SEM")
){
total += 6.50;
}

if(
pedido.bebida &&
!pedido.bebida.toUpperCase().includes("SEM")
){
total += 6.50;
}

return total;

}

function imprimirPedido(pedido){

const conteudo = `

PEDIDO #${pedido.id}

CLIENTE:
${pedido.nome || ""}

DATA:
${pedido.data_hora || ""}

ENTREGA:
${pedido.local_entrega || ""}

ENDEREÇO:
${pedido.endereco || ""}

EMBALAGEM:
${pedido.tamanho || ""}

PROTEÍNA:
${pedido.proteina || ""}

GUARNIÇÕES:
${pedido.guarnicoes || ""}

MOLHO:
${pedido.molho || ""}

MIX FOLHAS:
${pedido.mix_folhas || ""}

TALHER:
${pedido.talher || ""}

SOBREMESA:
${pedido.sobremesa || ""}

BEBIDA:
${pedido.bebida || ""}

PAGAMENTO:
${pedido.pagamento || ""}
`;

const janela =
window.open("","","width=400,height=700");

janela.document.write(`

<html>

<body onload="window.print();window.close();">

<pre style="font-size:18px;font-family:Arial">
${conteudo}
</pre>

</body>

</html>

`);

}

async function carregarPedidos(){

const { data, error } =
await supabaseClient
.from("pedidos")
.select("*")
.order("id",{ascending:false});

if(error){
console.log(error);
return;
}

const pendentes =
document.getElementById("pedidosPendentes");

const atendidos =
document.getElementById("pedidosAtendidos");

pendentes.innerHTML = "";
atendidos.innerHTML = "";

data.forEach(pedido => {

pedido.status =
String(pedido.status || "PENDENTE")
.toUpperCase()
.trim();

const valor =
calcularValor(pedido);

const card = `

<div class="cardPedidoResumo"
onclick="togglePedido(${pedido.id})">

<div>
#${pedido.id} - ${pedido.nome || ""}
</div>

<div>
${pedido.data_hora || ""}
</div>

</div>

<div class="cardPedido"
id="pedido_${pedido.id}">

<h2>#${pedido.id}</h2>

<p>👤 ${pedido.nome || ""}</p>

<p>📍 ${pedido.local_entrega || ""}</p>

<p>🏠 ${pedido.endereco || ""}</p>

<p>🥗 ${pedido.tamanho || ""}</p>

<p>🍖 ${pedido.proteina || ""}</p>

<p>🥙 ${pedido.guarnicoes || ""}</p>

<p>🧂 ${pedido.molho || ""}</p>

<p>🥬 ${pedido.mix_folhas || ""}</p>

<p>🍴 ${pedido.talher || ""}</p>

<p>🍰 ${pedido.sobremesa || ""}</p>

<p>🥤 ${pedido.bebida || ""}</p>

<p>💳 ${pedido.pagamento || ""}</p>

<h2 style="color:#22c55e;">
💰 R$ ${valor.toFixed(2)}
</h2>

<div style="display:flex;gap:15px;flex-wrap:wrap;">

${pedido.status !== "ATENDIDO" ? `

<button
class="btn btnPrint"
onclick="atenderPedido(${pedido.id})">
ATENDER E IMPRIMIR
</button>

` : ""}

<button
class="btn btnExcluir"
onclick="excluirPedido(${pedido.id})">
EXCLUIR
</button>

</div>

</div>

`;

if(pedido.status === "ATENDIDO"){
atendidos.innerHTML += card;
}else{
pendentes.innerHTML += card;
}

});

}

async function atenderPedido(id){

const { data } =
await supabaseClient
.from("pedidos")
.select("*")
.eq("id", id)
.single();

imprimirPedido(data);

await supabaseClient
.from("pedidos")
.update({
status:"ATENDIDO"
})
.eq("id", id);

setTimeout(() => {

carregarPedidos();
carregarDashboard();

},1000);

}

async function excluirPedido(id){

const confirmar =
confirm("Deseja excluir este pedido?");

if(!confirmar) return;

await supabaseClient
.from("pedidos")
.delete()
.eq("id", id);

carregarPedidos();
carregarDashboard();

}

async function carregarDashboard(){

const { data } =
await supabaseClient
.from("pedidos")
.select("*");

let hoje = 0;
let semana = 0;
let mes = 0;

const agora = new Date();

data.forEach(pedido => {

const valor =
calcularValor(pedido);

hoje += valor;
semana += valor;
mes += valor;

});

document.getElementById("totalHoje").innerText =
`R$ ${hoje.toFixed(2)}`;

document.getElementById("totalSemana").innerText =
`R$ ${semana.toFixed(2)}`;

document.getElementById("totalMes").innerText =
`R$ ${mes.toFixed(2)}`;

if(window.graficoVendas){
window.graficoVendas.destroy();
}

const ctx =
document.getElementById("graficoPedidos");

window.graficoVendas = new Chart(ctx,{

type:"bar",

data:{
labels:["Hoje","Semana","Mês"],

datasets:[{
label:"Total de Vendas",
data:[hoje,semana,mes]
}]
},

options:{
responsive:true
}

});

}

supabaseClient
.channel("tempo-real")

.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"pedidos"
},

() => {

carregarPedidos();
carregarDashboard();

}
)

.subscribe();

setInterval(() => {

carregarPedidos();
carregarDashboard();

},5000);

</script>

</body>
</html>
