<script>

"https://iwvyptljwwdqmpixgpyc.supabase.co",

function fazerLogin(){

sessionStorage.clear();

localStorage.clear();

const usuario =
document.getElementById("usuario").value;

const senha =
document.getElementById("senha").value;

if(
usuario === "admin" &&
senha === "123456"
){

localStorage.setItem("logado","sim");

document.getElementById("loginTela").style.display = "none";

document.getElementById("painel").style.display = "flex";

carregarPedidos();

carregarDashboard();

function logout(){

localStorage.clear();

sessionStorage.clear();

location.reload();

}

function limparCache(){

localStorage.clear();

sessionStorage.clear();

location.reload();

}

window.onload = function(){

const logado = localStorage.getItem("logado");

if(logado === "sim"){

document.getElementById("loginTela").style.display = "none";

document.getElementById("painel").style.display = "flex";

}else{

document.getElementById("loginTela").style.display = "flex";

document.getElementById("painel").style.display = "none";

}

carregarPedidos();

function abrirTela(id){

document.querySelectorAll(".tela")
.forEach(t => t.classList.remove("ativa"));

document.getElementById(id)
.classList.add("ativa");

}

function togglePedido(id){

const pedido =
document.getElementById(`pedido_${id}`);

pedido.classList.toggle("ativo");

}

function calcularValor(pedido){

let total = 0;

if(pedido.tamanho?.includes("270")){
total += 19.75;
}

if(pedido.tamanho?.includes("350")){
total += 21.75;
}

if(
pedido.talher &&
pedido.talher.toUpperCase().includes("SIM")
){
total += 0.75;
}

if(
pedido.sobremesa &&
!pedido.sobremesa.toUpperCase().includes("SEM")
){
total += 6.50;
}

if(
pedido.bebida &&
!pedido.bebida.toUpperCase().includes("SEM")
){
total += 6.50;
}

return total;

}

function imprimirPedido(pedido){

const valor = calcularValor(pedido);

const conteudo = `

<div id="cupom">

<div class="empresa">

<div class="subtitulo">

</div>

</div>

</div>

</div>

</div>

</div>

</div>

${pedido.guarnicoes || ""}
</div>

${pedido.molho || ""}
</div>

</div>

${pedido.talher &&

${pedido.talher}
</div>
`
: ""}

${pedido.sobremesa &&
!pedido.sobremesa.toUpperCase().includes("SEM")
? `
<div class="linha">
<b>SOBREMESA (+ R$ 6,50)</b><br>
${pedido.sobremesa}
</div>
`
: ""}

${pedido.bebida &&
!pedido.bebida.toUpperCase().includes("SEM")
? `
<div class="linha">
<b>BEBIDA (+ R$ 6,50)</b><br>
${pedido.bebida}
</div>
`
: ""}

<div class="linha">
<b>PAGAMENTO</b><br>
${pedido.pagamento || ""}
</div>

<hr>

<div class="total">
TOTAL<br>
R$ ${valor.toFixed(2)}
</div>

<div class="rodape">
DIVINA SALADA
</div>

</div>

`;

const janela = window.open("", "", "width=320,height=800");

janela.document.write(`

<html>

<head>

<title>IMPRESSÃO</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
}

#cupom{
width:80mm;
padding:5mm;

}

}

.rodape{

}

hr{

margin:15px 0;

body{

}

}

</style>

</head>

<body onload="window.print();setTimeout(()=>window.close(),500);">

${conteudo}

`);

}

async function carregarPedidos(){

const { data, error } =
await supabaseClient
.from("pedidos")
.select("*")
.order("id",{ascending:false});

if(error){
console.log(error);
return;
}

const pendentes =
document.getElementById("pedidosPendentes");

const atendidos =
document.getElementById("pedidosAtendidos");

pendentes.innerHTML = "";
atendidos.innerHTML = "";

data.forEach(pedido => {

pedido.status =
String(pedido.status || "PENDENTE")
.toUpperCase()
.trim();

const valor =
calcularValor(pedido);

const card = `

<div class="cardPedidoResumo pedidoItem"
onclick="togglePedido(${pedido.id})">

<div>
#${pedido.id} - ${pedido.nome || ""}
</div>

<div>
${pedido.data_hora || ""}
</div>

</div>

<div class="cardPedido"
id="pedido_${pedido.id}">

<h2>#${pedido.id}</h2>

<p>👤 ${pedido.nome || ""}</p>

<p>📍 ${pedido.local_entrega || ""}</p>

<p>🏠 ${pedido.endereco || ""}</p>

<p>🥗 ${pedido.tamanho || ""}</p>

<p>🍖 ${pedido.proteina || ""}</p>

<p>🥙 ${pedido.guarnicoes || ""}</p>

<p>🧂 ${pedido.molho || ""}</p>

<p>🥬 ${pedido.mix_folhas || ""}</p>

<p>🍴 ${pedido.talher || ""}</p>

<p>🍰 ${pedido.sobremesa || ""}</p>

<p>🥤 ${pedido.bebida || ""}</p>

<p>💳 ${pedido.pagamento || ""}</p>

<h2 style="color:#22c55e;">
💰 R$ ${valor.toFixed(2)}
</h2>

<div style="display:flex;gap:15px;flex-wrap:wrap;">

${pedido.status !== "ATENDIDO" ? `

<button
class="btn btnPrint"
onclick="atenderPedido(${pedido.id})">
ATENDER E IMPRIMIR
</button>

` : ""}

<button
class="btn btnEditar"
onclick="reimprimirPedido(${pedido.id})">
REIMPRIMIR
</button>

<button
class="btn btnExcluir"
onclick="excluirPedido(${pedido.id})">
EXCLUIR
</button>

</div>

</div>

`;

if(pedido.status === "ATENDIDO"){
atendidos.innerHTML += card;
}else{
pendentes.innerHTML += card;
}

});

}

async function atenderPedido(id){

const { data } =
await supabaseClient
.from("pedidos")
.select("*")
.eq("id", id)
.single();

imprimirPedido(data);

await supabaseClient
.from("pedidos")
.update({
status:"ATENDIDO"
})
.eq("id", id);

setTimeout(() => {

carregarPedidos();
carregarDashboard();

},1000);

}

async function reimprimirPedido(id){

const { data, error } =
await supabaseClient
.from("pedidos")
.select("*")
.eq("id", id)
.single();

if(error){

alert("Erro ao localizar pedido");

return;

}

imprimirPedido(data);

}

async function excluirPedido(id){

const confirmar =
confirm("Deseja excluir este pedido?");

if(!confirmar) return;

await supabaseClient
.from("pedidos")
.delete()
.eq("id", id);

carregarPedidos();
carregarDashboard();

}
function filtrarPedidos(tipo){

const valor =
document.getElementById(
tipo === "pendentes"
? "pesquisaPendentes"
: "pesquisaAtendidos"
)
.value
.toLowerCase();

const lista =
tipo === "pendentes"
? document.querySelectorAll("#pedidosPendentes .pedidoItem")
: document.querySelectorAll("#pedidosAtendidos .pedidoItem");

lista.forEach(item => {

const texto =
item.innerText.toLowerCase();

if(texto.includes(valor)){

item.style.display = "block";

}else{

item.style.display = "none";

}

});

}
async function carregarDashboard(){

const { data } =
await supabaseClient
.from("pedidos")
.select("*");

let hoje = 0;
let semana = 0;
let mes = 0;

const agora = new Date();

data.forEach(pedido => {

const valor =
calcularValor(pedido);

hoje += valor;
semana += valor;
mes += valor;

});

document.getElementById("totalHoje").innerText =
`R$ ${hoje.toFixed(2)}`;

document.getElementById("totalSemana").innerText =
`R$ ${semana.toFixed(2)}`;

document.getElementById("totalMes").innerText =
`R$ ${mes.toFixed(2)}`;

if(window.graficoVendas){
window.graficoVendas.destroy();
}

const ctx =
document.getElementById("graficoPedidos");

window.graficoVendas = new Chart(ctx,{

type:"bar",

data:{
labels:["Hoje","Semana","Mês"],

datasets:[{
label:"Total de Vendas",
data:[hoje,semana,mes]
}]
},

options:{
responsive:true
}

});

}

supabaseClient
.channel("tempo-real")

.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"pedidos"
},

() => {

carregarPedidos();
carregarDashboard();

}
)

.subscribe();

setInterval(() => {

carregarPedidos();
carregarDashboard();

},5000);

</script>
